<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retraction Hunter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --desk-color: #5C4033;
            --desk-line: #3b281f;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            width: 800px;
            height: 600px;
            position: relative;
            background: repeating-linear-gradient(
                0deg,
                var(--desk-color),
                var(--desk-color) 38px,
                var(--desk-line) 38px,
                var(--desk-line) 40px
            );
            border: 8px solid #222;
            overflow: hidden;
            cursor: none;
            box-shadow: 0 0 20px #000;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            color: #fff;
            text-shadow: 2px 2px #000;
            z-index: 100;
            pointer-events: none;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 200;
            text-align: center;
        }

        .hidden { display: none !important; }

        h1 {
            color: #ff4444;
            text-shadow: 4px 4px #000;
            line-height: 1.5;
        }

        button {
            font-family: 'Press Start 2P', monospace;
            background: #fff;
            color: #000;
            border: 4px solid #888;
            padding: 15px 20px;
            font-size: 16px;
            cursor: none;
            margin-top: 20px;
        }

        button:hover { background: #ccc; }

        #stamp-cursor {
            position: absolute;
            width: 60px;
            height: 60px;
            pointer-events: none;
            z-index: 999;
            transform: translate(-50%, -50%);
            transition: transform 0.05s ease-out;
        }

        #stamp-cursor::before {
            content: '';
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 20px;
            height: 30px;
            background: #333;
            border: 2px solid #000;
        }

        #stamp-cursor::after {
            content: '';
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 40px;
            height: 10px;
            background: #555;
            border: 2px solid #000;
        }

        .stamping { transform: translate(-50%, -50%) scale(0.7) !important; }

        .paper {
            position: absolute;
            background: #fff;
            border: 2px solid #000;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            text-align: center;
        }

        .paper-title {
            font-size: 8px;
            color: #333;
            pointer-events: none;
            line-height: 1.5;
            word-wrap: break-word;
            overflow: hidden;
            max-height: 100%;
        }

        .retracted-mark {
            position: absolute;
            color: red;
            border: 3px solid red;
            font-size: 12px;
            font-weight: bold;
            padding: 5px;
            transform: rotate(-15deg);
            opacity: 0.8;
            pointer-events: none;
            image-rendering: pixelated;
        }

        .floating-score {
            position: absolute;
            color: yellow;
            font-size: 16px;
            text-shadow: 2px 2px #000;
            pointer-events: none;
            z-index: 150;
            animation: floatUp 1s forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div>SCORE: <span id="score">0</span></div>
            <div>TIME: <span id="time">30</span></div>
        </div>

        <div id="start-screen" class="screen">
            <h1>RETRACTION<br>HUNTER</h1>
            <p style="font-size: 12px; line-height: 2;">
                Fake science is flying across your desk!<br><br>
                Use your mouse to stamp them.<br>
                Smaller/faster papers = More Points.<br>
            </p>
            <button onclick="startGame()">START SHIFT</button>
        </div>

        <div id="game-over-screen" class="screen hidden">
            <h1>SHIFT OVER</h1>
            <p>FINAL SCORE: <span id="final-score">0</span></p>
            <button onclick="startGame()">PLAY AGAIN</button>
        </div>

        <div id="stamp-cursor"></div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const cursor = document.getElementById('stamp-cursor');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreEl = document.getElementById('final-score');

        // Audio setup (Cloned on click to allow overlapping sounds)
        const stampAudioTemplate = new Audio('Sounds/freesound_community-stamp-102627.mp3');

        let score = 0;
        let timeLeft = 30;
        let isPlaying = false;
        let gameLoopId;
        let spawnIntervalId;
        let timerId;
        let papers = [];

        // 100 Titles (Generated & extracted from real dataset structures)
        const titles = [
            "Preoperative risk factors for intraabdominal adhesions should not contraindicate surgical laparoscopy for infertility",
            "Effect of cervical lidocaine-prilocaine cream on pain perception during copper T380A intrauterine device insertion",
            "Management of Spontaneous Labor in Primigravidae: Labor Scale versus WHO Partograph (SLiP Trial)",
            "AFAP1-AS1 Promotes Epithelial-Mesenchymal Transition and Tumorigenesis Through Wnt/β-Catenin Signaling Pathway",
            "MiR-221/222 Ameliorates Deoxynivalenol-Induced Apoptosis and Proliferation Inhibition in Intestinal Epithelial Cells",
            "Paeonol Suppresses Proliferation and Motility of Non-Small-Cell Lung Cancer Cells by Disrupting STAT3/NF-κB Signaling",
            "Application of artificial intelligence-assisted Traditional Chinese medicine formula granules in bone and joint degenerative diseases",
            "LncRNA MALAT1 promotes tumor progression in gastric cancer by targeting miR-124",
            "Circular RNA hsa_circ_0000069 regulates proliferation and apoptosis in cervical cancer cells",
            "Knockdown of circRNA_100876 suppresses proliferation and metastasis of osteosarcoma",
            // ... padding out to 100 titles to keep the code robust
            "Silencing of long noncoding RNA SNHG1 inhibits cell growth in lung cancer", "Expression of miR-21 in breast cancer tissues and its clinical significance",
            "Protective effects of ginsenoside Rg1 on ischemia-reperfusion injury in rat liver", "Overexpression of miR-155 promotes cell proliferation in hepatocellular carcinoma",
            "The therapeutic effect of traditional Chinese medicine in treating type 2 diabetes", "Identification of novel biomarkers for early diagnosis of Alzheimer's disease",
            "Role of the PI3K/AKT signaling pathway in regulating cell apoptosis", "Efficacy of acupuncture in treating chronic lower back pain: a meta-analysis",
            "Molecular mechanisms of drug resistance in targeted therapy for melanoma", "Effect of green tea extract on weight loss in obese adults: a randomized trial",
            "MicroRNA-122 promotes hepatitis C virus replication in liver cells", "Antioxidant activity of flavonoids isolated from Scutellaria baicalensis",
            "The impact of gut microbiota on the development of autoimmune diseases", "Stem cell therapy for spinal cord injury: current status and future perspectives",
            "Genetic variants associated with increased risk of cardiovascular disease", "Effects of sleep deprivation on cognitive function and memory consolidation",
            "The role of vitamin D in preventing respiratory tract infections", "Evaluation of a novel vaccine candidate against Zika virus",
            "Biomechanical analysis of different techniques for ACL reconstruction", "Nanoparticle-based drug delivery systems for targeted cancer therapy",
            "LncRNA HOTAIR promotes tumor growth and metastasis in colorectal cancer", "MicroRNA-146a regulates inflammatory responses in rheumatoid arthritis",
            "Effects of curcumin on the proliferation and apoptosis of prostate cancer cells", "The relationship between air pollution and respiratory diseases",
            "Dietary interventions for managing irritable bowel syndrome symptoms", "Pharmacokinetics and pharmacodynamics of a new antiepileptic drug",
            "The role of autophagy in neurodegenerative diseases", "Efficacy of cognitive behavioral therapy for treating depression in adolescents",
            "Biomarkers of oxidative stress in patients with chronic kidney disease", "The impact of exercise on insulin sensitivity in patients with type 2 diabetes",
            "LncRNA NEAT1 promotes epithelial-mesenchymal transition in ovarian cancer", "MicroRNA-29b regulates extracellular matrix production in diabetic nephropathy",
            "Effects of resveratrol on lipid metabolism and insulin resistance", "The role of epigenetic modifications in the development of cancer",
            "Evaluating the safety and efficacy of a new herbal supplement for weight loss", "The impact of maternal nutrition on fetal development and health outcomes",
            "Genetic and environmental factors influencing the risk of autism spectrum disorder", "The use of artificial intelligence in medical imaging and diagnosis",
            "Novel therapeutic targets for the treatment of inflammatory bowel disease", "The role of the microbiome in shaping immune system responses",
            "LncRNA PVT1 promotes proliferation and invasion in pancreatic cancer", "MicroRNA-200c inhibits epithelial-mesenchymal transition in breast cancer",
            "Effects of omega-3 fatty acids on cardiovascular health", "The relationship between sleep duration and risk of obesity",
            "Interventions for preventing falls in older adults: a systematic review", "Pharmacological management of neuropathic pain: current guidelines",
            "The role of mitochondrial dysfunction in aging and age-related diseases", "Efficacy of mindfulness-based stress reduction for improving mental health",
            "Biomarkers of inflammation in patients with chronic obstructive pulmonary disease", "The impact of dietary patterns on the risk of developing type 2 diabetes",
            "LncRNA GAS5 inhibits tumor growth and metastasis in lung cancer", "MicroRNA-34a induces apoptosis and cell cycle arrest in hepatocellular carcinoma",
            "Effects of probiotics on gut health and immune function", "The role of genetic testing in personalized medicine",
            "Evaluating the effectiveness of a new behavioral intervention for smoking cessation", "The impact of early life stress on brain development and mental health",
            "Genetic susceptibility to autoimmune diseases: insights from genome-wide association studies", "The use of wearable devices for monitoring health and physical activity",
            "Novel approaches for the treatment of drug-resistant infections", "The role of the gut-brain axis in regulating mood and behavior",
            "LncRNA TUG1 promotes proliferation and migration in glioblastoma", "MicroRNA-125b regulates apoptosis and drug resistance in leukemia",
            "Effects of intermittent fasting on metabolic health and longevity", "The relationship between physical activity and cognitive function in older adults",
            "Interventions for improving medication adherence in patients with chronic diseases", "Pharmacological therapies for the management of Alzheimer's disease",
            "The role of oxidative stress in the pathogenesis of cardiovascular diseases", "Efficacy of yoga for improving quality of life in patients with cancer",
            "Biomarkers of endothelial dysfunction in patients with heart failure", "The impact of dietary sugar intake on the risk of metabolic syndrome",
            "LncRNA UCA1 promotes proliferation and drug resistance in bladder cancer", "MicroRNA-15a/16-1 cluster regulates apoptosis in chronic lymphocytic leukemia",
            "Effects of vitamin C supplementation on immune function and cold duration", "The role of gene therapy in treating inherited genetic disorders",
            "Evaluating the safety and efficacy of a new targeted therapy for lung cancer", "The impact of social determinants of health on health disparities",
            "Genetic variants associated with risk of type 1 diabetes", "The use of telemedicine for providing healthcare services remotely",
            "Novel strategies for preventing and treating obesity", "The role of the immune system in recognizing and eliminating cancer cells",
            "LncRNA XIST promotes tumor growth and metastasis in cervical cancer", "MicroRNA-10b promotes migration and invasion in metastatic breast cancer",
            "Effects of dietary fiber on gut microbiota and metabolic health", "The relationship between stress and risk of cardiovascular disease",
            "Interventions for promoting healthy aging and preventing cognitive decline", "Pharmacological management of heart failure: current guidelines and future directions",
            "The role of inflammation in the pathogenesis of neurodegenerative diseases", "Efficacy of physical therapy for improving mobility in patients with Parkinson's disease",
            "Biomarkers of kidney injury in patients with acute kidney injury", "The impact of dietary sodium intake on blood pressure and cardiovascular risk",
            "LncRNA H19 promotes proliferation and invasion in hepatocellular carcinoma", "MicroRNA-210 regulates cellular response to hypoxia in cancer cells",
            "Effects of green tea consumption on risk of cardiovascular disease and mortality", "The role of personalized medicine in improving cancer treatment outcomes"
        ];

        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            cursor.style.left = `${e.clientX - rect.left}px`;
            cursor.style.top = `${e.clientY - rect.top}px`;
        });

        container.addEventListener('mousedown', (e) => {
            if (!isPlaying) return;
            
            cursor.classList.add('stamping');
            setTimeout(() => cursor.classList.remove('stamping'), 100);

            const clickedElement = e.target.closest('.paper');
            if (clickedElement && !clickedElement.dataset.stamped) {
                stampPaper(clickedElement, e.clientX, e.clientY);
            }
        });

        function startGame() {
            score = 0;
            timeLeft = 30;
            scoreEl.innerText = score;
            timeEl.innerText = timeLeft;
            isPlaying = true;

            papers.forEach(p => p.element.remove());
            papers = [];

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            timerId = setInterval(updateTime, 1000);
            spawnIntervalId = setInterval(spawnPaper, 600); 
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function updateTime() {
            timeLeft--;
            timeEl.innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }

        function spawnPaper() {
            if (!isPlaying) return;

            const paper = document.createElement('div');
            paper.className = 'paper';
            
            const sizeMod = Math.random(); 
            const width = 80 + (sizeMod * 60); 
            const height = 60 + (sizeMod * 40);
            const speedBase = (2 + (1 - sizeMod) * 3); 
            const points = Math.floor((1 - sizeMod) * 40) + 10; 

            // Pick a random edge to spawn from (0: Top, 1: Right, 2: Bottom, 3: Left)
            const edge = Math.floor(Math.random() * 4);
            let startX, startY, vx, vy;

            if (edge === 0) {
                startX = Math.random() * (800 - width);
                startY = -height;
                vx = (Math.random() - 0.5) * 2; // Slight diagonal
                vy = speedBase;
            } else if (edge === 1) {
                startX = 800;
                startY = Math.random() * (600 - height);
                vx = -speedBase;
                vy = (Math.random() - 0.5) * 2;
            } else if (edge === 2) {
                startX = Math.random() * (800 - width);
                startY = 600;
                vx = (Math.random() - 0.5) * 2;
                vy = -speedBase;
            } else {
                startX = -width;
                startY = Math.random() * (600 - height);
                vx = speedBase;
                vy = (Math.random() - 0.5) * 2;
            }

            paper.style.width = `${width}px`;
            paper.style.height = `${height}px`;
            paper.style.top = `${startY}px`;
            paper.style.left = `${startX}px`;

            const title = titles[Math.floor(Math.random() * titles.length)];
            paper.innerHTML = `<span class="paper-title">${title}</span>`;

            container.appendChild(paper);
            
            papers.push({
                element: paper, x: startX, y: startY, vx: vx, vy: vy, points: points, stamped: false
            });
        }

        let lastTime = 0;
        function gameLoop(currentTime) {
            if (!isPlaying) return;
            const deltaTime = (currentTime - lastTime) / 16; 
            lastTime = currentTime;

            for (let i = papers.length - 1; i >= 0; i--) {
                const p = papers[i];

                if (!p.stamped) {
                    p.x += p.vx * deltaTime;
                    p.y += p.vy * deltaTime;
                    p.element.style.left = `${p.x}px`;
                    p.element.style.top = `${p.y}px`;

                    // Remove if completely out of bounds in any direction
                    if (p.x > 900 || p.x < -200 || p.y > 700 || p.y < -200) {
                        p.element.remove();
                        papers.splice(i, 1);
                    }
                }
            }
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function stampPaper(paperElement, clickX, clickY) {
            const pIndex = papers.findIndex(p => p.element === paperElement);
            if (pIndex === -1) return;
            const p = papers[pIndex];

            // Play Sound
            const sfx = stampAudioTemplate.cloneNode();
            sfx.volume = 0.5;
            sfx.play().catch(e => console.log("Audio play blocked until user interaction", e));

            p.stamped = true;
            paperElement.dataset.stamped = "true";
            
            score += p.points;
            scoreEl.innerText = score;

            const mark = document.createElement('div');
            mark.className = 'retracted-mark';
            mark.innerText = 'RETRACTED';
            paperElement.appendChild(mark);

            const rect = container.getBoundingClientRect();
            const floatText = document.createElement('div');
            floatText.className = 'floating-score';
            floatText.innerText = `+${p.points}`;
            floatText.style.left = `${clickX - rect.left}px`;
            floatText.style.top = `${clickY - rect.top}px`;
            container.appendChild(floatText);

            paperElement.style.transition = "transform 0.5s ease-in, opacity 0.5s";
            paperElement.style.transform = `scale(0.8) translateY(100px)`;
            paperElement.style.opacity = "0";

            setTimeout(() => {
                paperElement.remove();
                floatText.remove();
                const indexToRemove = papers.indexOf(p);
                if(indexToRemove > -1) papers.splice(indexToRemove, 1);
            }, 500);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerId);
            clearInterval(spawnIntervalId);
            cancelAnimationFrame(gameLoopId);
            
            finalScoreEl.innerText = score;
            gameOverScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
