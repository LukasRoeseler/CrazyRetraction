<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retraction Hunter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --desk-color: #5C4033;
            --desk-line: #3b281f;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            width: 800px;
            height: 600px;
            position: relative;
            background: repeating-linear-gradient(
                0deg,
                var(--desk-color),
                var(--desk-color) 38px,
                var(--desk-line) 38px,
                var(--desk-line) 40px
            );
            border: 8px solid #222;
            overflow: hidden;
            cursor: none;
            box-shadow: 0 0 20px #000;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            color: #fff;
            text-shadow: 2px 2px #000;
            z-index: 100;
            pointer-events: none;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 200;
            text-align: center;
        }

        .hidden { display: none !important; }

        h1 {
            color: #ff4444;
            text-shadow: 4px 4px #000;
            line-height: 1.5;
        }

        button {
            font-family: 'Press Start 2P', monospace;
            background: #fff;
            color: #000;
            border: 4px solid #888;
            padding: 15px 20px;
            font-size: 16px;
            cursor: none;
            margin-top: 20px;
        }

        button:hover { background: #ccc; }

        #stamp-cursor {
            position: absolute;
            width: 60px;
            height: 60px;
            pointer-events: none;
            z-index: 999;
            transform: translate(-50%, -50%);
            transition: transform 0.05s ease-out;
        }

        #stamp-cursor::before {
            content: '';
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 20px;
            height: 30px;
            background: #333;
            border: 2px solid #000;
        }

        #stamp-cursor::after {
            content: '';
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 40px;
            height: 10px;
            background: #555;
            border: 2px solid #000;
        }

        .stamping { transform: translate(-50%, -50%) scale(0.7) !important; }

        .paper {
            position: absolute;
            background: #fff;
            border: 2px solid #000;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            text-align: center;
        }

        .paper-title {
            font-size: 8px;
            color: #333;
            pointer-events: none;
            line-height: 1.5;
            word-wrap: break-word;
            overflow: hidden;
            max-height: 100%;
        }

        .retracted-mark {
            position: absolute;
            color: red;
            border: 3px solid red;
            font-size: 12px;
            font-weight: bold;
            padding: 5px;
            transform: rotate(-15deg);
            opacity: 0.8;
            pointer-events: none;
            image-rendering: pixelated;
        }

        .floating-score {
            position: absolute;
            color: yellow;
            font-size: 16px;
            text-shadow: 2px 2px #000;
            pointer-events: none;
            z-index: 150;
            animation: floatUp 1s forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div>SCORE: <span id="score">0</span></div>
            <div>TIME: <span id="time">30</span></div>
        </div>

        <div id="start-screen" class="screen">
            <h1>RETRACTION<br>HUNTER</h1>
            <p style="font-size: 12px; line-height: 2;">
                Fake science is flying across your desk!<br><br>
                Use your mouse to stamp them.<br>
                Smaller/faster papers = More Points.<br>
            </p>
            <button onclick="startGame()">START SHIFT</button>
        </div>

        <div id="game-over-screen" class="screen hidden">
            <h1>SHIFT OVER</h1>
            <p>FINAL SCORE: <span id="final-score">0</span></p>
            <button onclick="startGame()">PLAY AGAIN</button>
        </div>

        <div id="stamp-cursor"></div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const cursor = document.getElementById('stamp-cursor');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreEl = document.getElementById('final-score');

        // Audio setup
        const stampAudioTemplate = new Audio('Sounds/freesound_community-stamp-102627.mp3');
        const gameOverAudio = new Audio('Sounds/audley_fergine-game-over-classic-206486.mp3');

        let score = 0;
        let timeLeft = 30;
        let isPlaying = false;
        let gameLoopId;
        let spawnIntervalId;
        let timerId;
        let papers = [];

        // Add your 100 generated titles here
        const titles = [
            "Preoperative risk factors for intraabdominal adhesions should not contraindicate surgical laparoscopy for infertility",
            "Effect of cervical lidocaine-prilocaine cream on pain perception during copper T380A intrauterine device insertion",
            "Management of Spontaneous Labor in Primigravidae: Labor Scale versus WHO Partograph (SLiP Trial)",
            "AFAP1-AS1 Promotes Epithelial-Mesenchymal Transition and Tumorigenesis Through Wnt/β-Catenin Signaling Pathway",
            "MiR-221/222 Ameliorates Deoxynivalenol-Induced Apoptosis and Proliferation Inhibition in Intestinal Epithelial Cells"
            // ... Paste the rest from the R script output
        ];

        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            cursor.style.left = `${e.clientX - rect.left}px`;
            cursor.style.top = `${e.clientY - rect.top}px`;
        });

        container.addEventListener('mousedown', (e) => {
            if (!isPlaying) return;
            
            cursor.classList.add('stamping');
            setTimeout(() => cursor.classList.remove('stamping'), 100);

            const clickedElement = e.target.closest('.paper');
            if (clickedElement && !clickedElement.dataset.stamped) {
                stampPaper(clickedElement, e.clientX, e.clientY);
            }
        });

        function startGame() {
            score = 0;
            timeLeft = 30;
            scoreEl.innerText = score;
            timeEl.innerText = timeLeft;
            isPlaying = true;

            papers.forEach(p => p.element.remove());
            papers = [];

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            timerId = setInterval(updateTime, 1000);
            spawnIntervalId = setInterval(spawnPaper, 600); 
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function updateTime() {
            timeLeft--;
            timeEl.innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }

        function spawnPaper() {
            if (!isPlaying) return;

            const paper = document.createElement('div');
            paper.className = 'paper';
            
            const sizeMod = Math.random(); 
            const width = 80 + (sizeMod * 60); 
            const height = 60 + (sizeMod * 40);
            const speedBase = (2 + (1 - sizeMod) * 3); 
            const points = Math.floor((1 - sizeMod) * 40) + 10; 

            const edge = Math.floor(Math.random() * 4);
            let startX, startY, vx, vy;

            if (edge === 0) { // Top
                startX = Math.random() * (800 - width);
                startY = -height;
                vx = (Math.random() - 0.5) * 2; 
                vy = speedBase;
            } else if (edge === 1) { // Right
                startX = 800;
                startY = Math.random() * (600 - height);
                vx = -speedBase;
                vy = (Math.random() - 0.5) * 2;
            } else if (edge === 2) { // Bottom
                startX = Math.random() * (800 - width);
                startY = 600;
                vx = (Math.random() - 0.5) * 2;
                vy = -speedBase;
            } else { // Left
                startX = -width;
                startY = Math.random() * (600 - height);
                vx = speedBase;
                vy = (Math.random() - 0.5) * 2;
            }

            paper.style.width = `${width}px`;
            paper.style.height = `${height}px`;
            paper.style.top = `${startY}px`;
            paper.style.left = `${startX}px`;

            const title = titles[Math.floor(Math.random() * titles.length)];
            paper.innerHTML = `<span class="paper-title">${title}</span>`;

            container.appendChild(paper);
            
            papers.push({
                element: paper, x: startX, y: startY, vx: vx, vy: vy, points: points, stamped: false
            });
        }

        let lastTime = 0;
        function gameLoop(currentTime) {
            if (!isPlaying) return;
            const deltaTime = (currentTime - lastTime) / 16; 
            lastTime = currentTime;

            for (let i = papers.length - 1; i >= 0; i--) {
                const p = papers[i];

                if (!p.stamped) {
                    p.x += p.vx * deltaTime;
                    p.y += p.vy * deltaTime;
                    p.element.style.left = `${p.x}px`;
                    p.element.style.top = `${p.y}px`;

                    if (p.x > 900 || p.x < -200 || p.y > 700 || p.y < -200) {
                        p.element.remove();
                        papers.splice(i, 1);
                    }
                }
            }
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function stampPaper(paperElement, clickX, clickY) {
            const pIndex = papers.findIndex(p => p.element === paperElement);
            if (pIndex === -1) return;
            const p = papers[pIndex];

            const sfx = stampAudioTemplate.cloneNode();
            sfx.volume = 0.5;
            sfx.play().catch(e => console.log("Audio play blocked", e));

            p.stamped = true;
            paperElement.dataset.stamped = "true";
            
            score += p.points;
            scoreEl.innerText = score;

            const mark = document.createElement('div');
            mark.className = 'retracted-mark';
            mark.innerText = 'RETRACTED';
            paperElement.appendChild(mark);

            const rect = container.getBoundingClientRect();
            const floatText = document.createElement('div');
            floatText.className = 'floating-score';
            floatText.innerText = `+${p.points}`;
            floatText.style.left = `${clickX - rect.left}px`;
            floatText.style.top = `${clickY - rect.top}px`;
            container.appendChild(floatText);

            paperElement.style.transition = "transform 0.5s ease-in, opacity 0.5s";
            paperElement.style.transform = `scale(0.8) translateY(100px)`;
            paperElement.style.opacity = "0";

            setTimeout(() => {
                paperElement.remove();
                floatText.remove();
                const indexToRemove = papers.indexOf(p);
                if(indexToRemove > -1) papers.splice(indexToRemove, 1);
            }, 500);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerId);
            clearInterval(spawnIntervalId);
            cancelAnimationFrame(gameLoopId);
            
            // Play Game Over Sound
            gameOverAudio.volume = 0.7;
            gameOverAudio.play().catch(e => console.log("Audio play blocked", e));

            finalScoreEl.innerText = score;
            gameOverScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
