<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retraction Hunter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --desk-color: #5C4033;
            --desk-line: #3b281f;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            width: 800px;
            height: 600px;
            position: relative;
            background: repeating-linear-gradient(
                0deg,
                var(--desk-color),
                var(--desk-color) 38px,
                var(--desk-line) 38px,
                var(--desk-line) 40px
            );
            border: 8px solid #222;
            overflow: hidden;
            cursor: none;
            box-shadow: 0 0 20px #000;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            color: #fff;
            text-shadow: 2px 2px #000;
            z-index: 100;
            pointer-events: none;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 200;
            text-align: center;
        }

        .hidden { display: none !important; }

        h1 {
            color: #ff4444;
            text-shadow: 4px 4px #000;
            line-height: 1.5;
        }

        button {
            font-family: 'Press Start 2P', monospace;
            background: #fff;
            color: #000;
            border: 4px solid #888;
            padding: 15px 20px;
            font-size: 16px;
            cursor: none;
            margin-top: 20px;
        }

        button:hover { background: #ccc; }

        #stamp-cursor {
            position: absolute;
            width: 60px;
            height: 60px;
            pointer-events: none;
